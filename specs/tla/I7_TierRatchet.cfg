\* Apalache bounded model check — I7_TierRatchet
\* NS∞ Dignity Kernel  |  AXIOLEV Holdings LLC © 2026
\*
\* Property: tier_latch >= prev_tier in every state — TierLatch is monotonically
\*           non-decreasing (ratchet-only: 0 → 2 → 3, never reversed).
\*           prev_tier is a ghost variable set to the pre-transition value by RaiseLatch.
\* Domain cardinality: 4 (AUTH_BYPASS=0, SYS_DESTRUCT=1, POLICY_OVERRIDE=2, H_OP=3)
\* Constants are initialised via --cinit=CInit in the TLA+ module.
\*
\* Run:
\*   apalache-mc check --length=8 --inv=I7_TierRatchet --cinit=CInit Dignity.tla

CONSTANTS
    AUTH_BYPASS     = 0
    SYS_DESTRUCT    = 1
    POLICY_OVERRIDE = 2
    H_OP            = 3

INIT Init
NEXT Next
INVARIANT I7_TierRatchet
