version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ns
      POSTGRES_USER: ns
      POSTGRES_PASSWORD: ns_secure_pwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ns"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ns_core:
    build:
      context: .
      dockerfile: services/ns_core/Dockerfile
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  alexandria:
    build:
      context: .
      dockerfile: services/alexandria/Dockerfile
    ports:
      - "9001:9001"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      ALEXANDRIA_SSD: /Volumes/NSExternal
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /Volumes/NSExternal:/Volumes/NSExternal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  model_router:
    build:
      context: .
      dockerfile: services/model_router/Dockerfile
    ports:
      - "9002:9002"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  canon:
    build:
      context: .
      dockerfile: services/canon/Dockerfile
    ports:
      - "9004:9004"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  integrity:
    build:
      context: .
      dockerfile: services/integrity/Dockerfile
    ports:
      - "9005:9005"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
