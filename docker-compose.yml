version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ns
      POSTGRES_USER: ns
      POSTGRES_PASSWORD: ns_secure_pwd
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ns"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ns_core:
    build:
      context: .
      dockerfile: services/ns_core/Dockerfile
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      REDIS_URL: redis://redis:6379
      NORTHSTAR_WEBHOOK_BASE: ${NORTHSTAR_WEBHOOK_BASE:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  alexandria:
    build:
      context: .
      dockerfile: services/alexandria/Dockerfile
    ports:
      - "9001:9001"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      ALEXANDRIA_SSD: /Volumes/NSExternal
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /Volumes/NSExternal:/Volumes/NSExternal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  model_router:
    build:
      context: .
      dockerfile: services/model_router/Dockerfile
    ports:
      - "9002:9002"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-host.docker.internal}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3:latest}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9002/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  violet:
    build:
      context: .
      dockerfile: services/violet/Dockerfile
    ports:
      - "9003:9003"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9003/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  canon:
    build:
      context: .
      dockerfile: services/canon/Dockerfile
    ports:
      - "9004:9004"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9004/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  integrity:
    build:
      context: .
      dockerfile: services/integrity/Dockerfile
    ports:
      - "9005:9005"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9005/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  omega:
    build:
      context: .
      dockerfile: services/omega/Dockerfile
    ports:
      - "9010:9010"
    environment:
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      ALEXANDRIA_PATH: /Volumes/NSExternal
      OMEGA_PORT: 9010
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /Volumes/NSExternal:/Volumes/NSExternal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9010/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  handrail:
    build:
      context: .
      dockerfile: services/handrail/Dockerfile
    ports:
      - "8011:8011"
    environment:
      HR_WORKSPACE: /app
      DATABASE_URL: postgresql://ns:ns_secure_pwd@postgres:5432/ns
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      YUBIKEY_CLIENT_ID: ${YUBIKEY_CLIENT_ID:-}
      YUBIKEY_SECRET_KEY: ${YUBIKEY_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /Volumes/NSExternal:/Volumes/NSExternal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  continuum:
    build:
      context: services/continuum
      dockerfile: Dockerfile
    ports:
      - "8788:8788"
    environment:
      ALEXANDRIA_PATH: /Volumes/NSExternal
    volumes:
      - /Volumes/NSExternal:/Volumes/NSExternal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8788/state')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ns_api:
    build:
      context: .
      dockerfile: services/ns_api/Dockerfile
    ports:
      - "9011:9011"
    environment:
      OMEGA_URL: http://omega:9010
      NS_URL: http://ns_core:9000
      HANDRAIL_URL: http://handrail:8011
      CONTINUUM_URL: http://continuum:8788
      ATOMLEX_URL: http://atomlex:8080
      ALEXANDRIA_PATH: /Volumes/NSExternal
    depends_on:
      omega:
        condition: service_healthy
      ns_core:
        condition: service_healthy
      handrail:
        condition: service_healthy
      continuum:
        condition: service_healthy
    volumes:
      - /Volumes/NSExternal:/Volumes/NSExternal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9011/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ns_ui:
    build:
      context: ns_ui
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_NS_API_URL: http://ns_api:9011
      NEXT_PUBLIC_NS_URL: http://ns_core:9000
      NEXT_PUBLIC_HANDRAIL_URL: http://handrail:8011
      HOSTNAME: "0.0.0.0"
    depends_on:
      ns_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i | awk '{print $1}'):3001"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  omega_logos:
    build:
      context: .
      dockerfile: services/omega_logos/Dockerfile
    image: ns/omega_logos:latest
    container_name: ns_omega_logos
    restart: unless-stopped
    ports:
      - "9010:9010"
    environment:
      - PYTHONUNBUFFERED=1
      - ALEXANDRIA=/alexandria
    volumes:
      - ${ALEXANDRIA:-/Volumes/NSExternal/ALEXANDRIA}:/alexandria
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:9010/api/v1/omega/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:

