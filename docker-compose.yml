services:
  handrail:
    build:
      context: .
      dockerfile: services/handrail/Dockerfile
    environment:
      HR_WORKSPACE: ${HR_WORKSPACE}
    ports:
      - "8011:8011"
    volumes:
      - ${HR_WORKSPACE}:${HR_WORKSPACE}
      - /var/run/docker.sock:/var/run/docker.sock
      - .:${HR_WORKSPACE}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/healthz')\""]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  ns:
    build: ./services/ns
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - ./.runs:/app/.runs
      - /Volumes/NSExternal:/Volumes/NSExternal
    depends_on:
      handrail:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz')\""]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s

  continuum:
    build: ./services/continuum
    ports:
      - "8788:8788"
    depends_on:
      ns:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/healthz')\""]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
